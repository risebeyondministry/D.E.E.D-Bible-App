<script>
  const player = document.getElementById("player");
  const select = document.getElementById("trackSelect");

  async function buildDropdown() {
    const response = await fetch("bible_manifest.json");
    const manifest = await response.json();

    // Clear and add placeholder
    select.innerHTML = "";
    const placeholder = document.createElement("option");
    placeholder.value = "";
    placeholder.textContent = "-- Select a track --";
    select.appendChild(placeholder);

    // Loop through each book in manifest
    for (const key of Object.keys(manifest)) {
      const b = manifest[key];
      const group = document.createElement("optgroup");
      group.label = b.label;

      for (let i = 1; i <= b.count; i++) {
        const option = document.createElement("option");
        option.value = `${b.folder}/${b.prefix}${i}.mp3`; // clean filenames
        option.textContent = `${b.prefix} ${i}`;           // user-friendly label
        group.appendChild(option);
      }

      select.appendChild(group);
    }
  }

  buildDropdown();

  // Load selected track into player
  select.addEventListener("change", () => {
    if (!select.value) return;
    player.src = select.value;
    player.load();
    // Let user click Play (avoids autoplay restrictions)
  });
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Book of Psalms</title>
</head>
<body>
  <h1>The Book of Psalms</h1>

  <!-- Dropdown to select Psalm -->
  <select id="trackSelect">
  <option value="audio_bible/psalms/Psalm 001.mp3">Psalm 1</option>
  <option value="audio_bible/psalms/Psalm 002.mp3">Psalm 2</option>
  <option value="audio_bible/psalms/Psalm 003.mp3">Psalm 3</option>
  <option value="audio_bible/psalms/Psalm 004.mp3">Psalm 4</option>
  <option value="audio_bible/psalms/Psalm 005.mp3">Psalm 5</option>
  <option value="audio_bible/psalms/Psalm 006.mp3">Psalm 6</option>
  <option value="audio_bible/psalms/Psalm 007.mp3">Psalm 7</option>
  <option value="audio_bible/psalms/Psalm 008.mp3">Psalm 8</option>
  <option value="audio_bible/psalms/Psalm 009.mp3">Psalm 9</option>
  <option value="audio_bible/psalms/Psalm 010.mp3">Psalm 10</option>
  <!-- … continue incrementing in the same pattern … -->
  <option value="audio_bible/psalms/Psalm 147.mp3">Psalm 147</option>
  <option value="audio_bible/psalms/Psalm 148.mp3">Psalm 148</option>
  <option value="audio_bible/psalms/Psalm 149.mp3">Psalm 149</option>
  <option value="audio_bible/psalms/Psalm 150.mp3">Psalm 150</option>
  <option value="audio_bible/psalms/Psalm 151.mp3">Psalm 151</option>
</select>

  </select>

  <!-- Single audio player -->
  <audio id="player" controls></audio>

  <script>
    const player = document.getElementById("player");
    const select = document.getElementById("trackSelect");

    // Load the first track by default
    player.src = select.value;

    // Change track when dropdown changes
    select.addEventListener("change", () => {
      player.src = select.value;
      player.play();
    });
  </script>
</body>
</html>

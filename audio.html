<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Bible</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 20px;
    }
    h1 {
      color: #2c3e50;
      margin-bottom: 16px;
    }
    .accordion {
      background-color: #0077cc;
      color: white;
      cursor: pointer;
      padding: 12px;
      width: 100%;
      border: none;
      text-align: left;
      outline: none;
      font-size: 16px;
      border-radius: 5px;
      margin-bottom: 5px;
    }
    .active, .accordion:hover {
      background-color: #005fa3;
    }
    .panel {
      padding: 0 15px;
      background-color: white;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.2s ease-out;
      border-radius: 5px;
      margin-bottom: 10px;
      border: 1px solid #e6e6e6;
    }
    .chapter {
      margin: 10px 0;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    .chapter:last-child {
      border-bottom: none;
    }
    audio {
      width: 100%;
      margin-top: 6px;
    }
    .back {
      display: inline-block;
      margin-bottom: 12px;
      color: #0077cc;
      text-decoration: none;
    }
    .back:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back to Home</a>
  <h1>Audio Bible</h1>

  <!-- Psalms Accordion -->
  <button class="accordion">Psalms 1–20</button>
  <div class="panel">
    <!-- Psalms 1–20 -->
    ${[...Array(20)].map((_, i) => {
      const num = i + 1;
      return `<div class="chapter"><strong>Psalm ${num}</strong>
        <audio controls><source src="audio_bible/psalms/psalms${num}.mp3" type="audio/mpeg"></audio>
      </div>`;
    }).join('\n')}
  </div>

  <!-- Proverbs Accordion -->
  <button class="accordion">Proverbs 1–10</button>
  <div class="panel">
    <!-- Proverbs 1–10 -->
    ${[...Array(10)].map((_, i) => {
      const num = i + 1;
      return `<div class="chapter"><strong>Proverbs ${num}</strong>
        <audio controls><source src="audio_bible/proverbs/proverbs${num}.mp3" type="audio/mpeg"></audio>
      </div>`;
    }).join('\n')}
  </div>

  <script>
    document.querySelectorAll(".accordion").forEach(button => {
      button.addEventListener("click", () => {
        button.classList.toggle("active");
        const panel = button.nextElementSibling;
        if (panel.style.maxHeight) {
          panel.style.maxHeight = null;
        } else {
          panel.style.maxHeight = panel.scrollHeight + "px";
        }
      });
    });
  </script>
</body>
</html>

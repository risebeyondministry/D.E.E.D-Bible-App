<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Bible</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f4f4; margin:20px; }
    h1 { color:#2c3e50; }
    .accordion {
      background:#0077cc; color:white; cursor:pointer;
      padding:12px; width:100%; border:none; text-align:left;
      font-size:16px; border-radius:5px; margin-bottom:5px;
    }
    .active, .accordion:hover { background:#005fa3; }
    .panel {
      background:white; max-height:0; overflow:hidden;
      transition:max-height 0.2s ease-out;
      border-radius:5px; margin-bottom:10px; padding:0 15px;
    }
    .chapter { margin:10px 0; padding:10px 0; border-bottom:1px solid #eee; }
    .chapter:last-child { border-bottom:none; }
    audio { width:100%; margin-top:6px; }
  </style>
</head>
<body>
  <h1>Audio Bible</h1>

 <!-- Psalms 1–20 -->
<button class="accordion">Psalms 1–20</button>
<div class="panel">
  <div class="chapter"><strong>Psalm 1</strong>
    <audio controls><source src="audio_bible/psalms/Psalm001.mp3" type="audio/mpeg"></audio>
  </div>
  <div class="chapter"><strong>Psalm 2</strong>
    <audio controls><source src="audio_bible/psalms/Psalm002.mp3" type="audio/mpeg"></audio>
  </div>
  <!-- Repeat pattern -->
  <div class="chapter"><strong>Psalm 20</strong>
    <audio controls><source src="audio_bible/psalms/Psalm020.mp3" type="audio/mpeg"></audio>
  </div>
</div>

<!-- Psalms 21–40 -->
<button class="accordion">Psalms 21–40</button>
<div class="panel">
  <div class="chapter"><strong>Psalm 21</strong>
    <audio controls><source src="audio_bible/psalms/Psalm021.mp3" type="audio/mpeg"></audio>
  </div>
  <!-- Repeat pattern -->
  <div class="chapter"><strong>Psalm 40</strong>
    <audio controls><source src="audio_bible/psalms/Psalm040.mp3" type="audio/mpeg"></audio>

</div>

  <!-- Proverbs Accordion -->
  <button class="accordion">Proverbs 1–10</button>
  <div class="panel">
    <div class="chapter"><strong>Proverbs 1</strong>
      <audio controls><source src="audio_bible/proverbs/proverbs1.mp3" type="audio/mpeg"></audio>
    </div>
    <div class="chapter"><strong>Proverbs 2</strong>
      <audio controls><source src="audio_bible/proverbs/proverbs2.mp3" type="audio/mpeg"></audio>
    </div>
    <!-- Repeat up to Proverbs 10 -->
    <div class="chapter"><strong>Proverbs 10</strong>
      <audio controls><source src="audio_bible/proverbs/proverbs10.mp3" type="audio/mpeg"></audio>
    </div>
  </div>

  <script>
    document.querySelectorAll(".accordion").forEach(button => {
      button.addEventListener("click", () => {
        button.classList.toggle("active");
        const panel = button.nextElementSibling;
        if (panel.style.maxHeight) {
          panel.style.maxHeight = null;
        } else {
          panel.style.maxHeight = panel.scrollHeight + "px";
        }
      });
    });
  </script>
</body>
</html>

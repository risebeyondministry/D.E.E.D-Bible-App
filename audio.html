<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Book of Psalms</title>
</head>
<body>
  <h1>The Book of Psalms</h1>

  <!-- Dropdown to select Psalm -->
  <select id="trackSelect">
    <option value="Psalm001.mp3">Psalm 1</option>
    <option value="Psalm002.mp3">Psalm 2</option>
    <option value="Psalm003.mp3">Psalm 3</option>
    <!-- continue up to Psalm150 -->
    <option value="Psalm150.mp3">Psalm 150</option>
  </select>

  <!-- Single audio player -->
  <audio id="player" controls></audio>

  <script>
    const player = document.getElementById("player");
    const select = document.getElementById("trackSelect");

    // Load the first track by default
    player.src = select.value;

    // Change track when dropdown changes
    select.addEventListener("change", () => {
      player.src = select.value;
      // playback controlled manually by user
    });
  </script>
</body>
</html>

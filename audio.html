<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Book of Psalms</title>
</head>
<body>
  <h1>The Book of Psalms</h1>

  <!-- Dropdown to select Psalm -->
  <select id="trackSelect">
  <option value="https://risebeyondministry.github.io/D.E.E.D-Bible-App/devotionals/Psalm 001.mp3">Psalm 1</option>
  <option value="https://risebeyondministry.github.io/D.E.E.D-Bible-App/devotionals/Psalm 002.mp3">Psalm 2</option>
  <option value="https://risebeyondministry.github.io/D.E.E.D-Bible-App/devotionals/Psalm 003.mp3">Psalm 3</option>
  <option value="https://risebeyondministry.github.io/D.E.E.D-Bible-App/devotionals/Psalm 004.mp3">Psalm 4</option>
  <option value="https://risebeyondministry.github.io/D.E.E.D-Bible-App/devotionals/Psalm 005.mp3">Psalm 5</option>
</select>



  </select>

  <!-- Single audio player -->
  <audio id="player" controls></audio>

  <script>
    const player = document.getElementById("player");
    const select = document.getElementById("trackSelect");

    // Load the first track by default
    player.src = select.value;

    // Change track when dropdown changes
    select.addEventListener("change", () => {
      player.src = select.value;
      // Removed player.play() so user controls playback manually
    });
  </script>
</body>
</html>
